<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proceso de Integración Horizontal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050811;         /* Fondo exterior ultra oscuro */
            --container-bg: #0b0f19;     /* Fondo del contenedor principal */
            --card-bg: #1e293b;          /* Gris azulado para las tarjetas */
            --border-color: #334155;     /* Borde por defecto */
            --text-color: #ffffff;       /* Texto principal */
            --line-color: #4f5769;       /* Líneas de conexión */
            --accent-color: #f59e0b;     /* Amarillo/Naranja para los iconos y destaques */
            --card-width: 160px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
        }

        /* Contenedor Principal (Marco de la imagen original) */
        .main-container {
            background-color: var(--container-bg);
            border: 2px solid #1e293b;
            border-radius: 24px;
            padding: 40px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        /* Columna de Orígenes (Izquierda) */
        .sources-column {
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 2;
        }

        /* Tarjetas de origen */
        .card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            width: var(--card-width);
            padding: 14px 20px;
            text-align: center;
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateX(-30px);
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
            transform: translateY(-2px) scale(1.03) !important;
            border-color: #475569;
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.05);
        }

        /* ==========================================================
           SISTEMA DE CONECTOR BIFURCADO EN HORIZONTAL
           ========================================================== */
        .fork-connector {
            display: flex;
            align-items: center;
            flex: 1;
            height: 140px; /* Cubre la altura entre la primera y última tarjeta */
            position: relative;
            max-width: 120px;
            margin: 0 15px;
        }

        /* Líneas curvas que salen de cada tarjeta y se unen al centro */
        .fork-line {
            position: absolute;
            right: 0;
            width: 50%;
            height: 50%;
            border-right: 2px solid var(--line-color);
            opacity: 0;
        }

        /* Línea de arriba (Clientes -> Centro) */
        .fork-line-top {
            top: 0;
            border-top: 2px solid var(--line-color);
            border-top-right-radius: 12px;
            transform-origin: top left;
        }

        /* Línea del centro (Productos -> Centro directo) */
        .fork-line-middle {
            top: 50%;
            width: 100%;
            height: 2px;
            background-color: var(--line-color);
            transform: scaleX(0);
            transform-origin: left;
        }

        /* Línea de abajo (Ventas -> Centro) */
        .fork-line-bottom {
            bottom: 0;
            border-bottom: 2px solid var(--line-color);
            border-bottom-right-radius: 12px;
            transform-origin: bottom left;
        }

        /* Canal principal con flecha apuntando a "Integración" */
        .main-channel {
            position: relative;
            flex: 1.2;
            height: 2px;
            background-color: var(--line-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            transform: scaleX(0);
            transform-origin: left;
        }

        /* Texto "Procesos de" encima de la línea central */
        .channel-text {
            position: absolute;
            top: -24px;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Punta de la flecha que entra a Integración */
        .main-channel::after {
            content: '';
            position: absolute;
            right: -2px;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 6px solid var(--line-color);
        }

        /* ==========================================================
           SECCIÓN CENTRAL: INTEGRACIÓN
           ========================================================== */
        .center-node {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .integration-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: scale(0.9);
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .integration-card:hover {
            transform: scale(1.05) !important;
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.15);
        }

        /* Engranaje animado */
        .gear-icon {
            width: 28px;
            height: 28px;
            fill: var(--accent-color);
            animation: rotateGear 8s linear infinite;
        }

        /* Flecha grande con degradado (Transición a Dataset) */
        .transition-arrow {
            flex: 1;
            height: 24px;
            background: linear-gradient(90deg, var(--line-color) 0%, var(--accent-color) 100%);
            clip-path: polygon(0% 30%, 80% 30%, 80% 0%, 100% 50%, 80% 100%, 80% 70%, 0% 70%);
            margin: 0 25px;
            opacity: 0;
            transform: scaleX(0);
            transform-origin: left;
        }

        /* ==========================================================
           SECCIÓN DERECHA: DATASET UNIFICADO
           ========================================================== */
        .dest-node {
            position: relative;
            z-index: 2;
        }

        .dataset-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateX(30px);
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .dataset-card:hover {
            transform: scale(1.05) !important;
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.2);
        }

        /* Icono de Base de datos (Cilindro) */
        .db-icon {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 2;
        }

        /* ==========================================================
           ANIMACIONES SECUENCIALES
           ========================================================== */
        .anim-card-left {
            animation: slideInLeft 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .anim-fork-lines {
            animation: drawLines 0.4s ease-out forwards;
        }
        .anim-channel {
            animation: scaleHorizontal 0.4s ease-out forwards;
        }
        .anim-text {
            animation: fadeIn 0.3s ease-out forwards;
        }
        .anim-card-center {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .anim-trans-arrow {
            animation: scaleHorizontal 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .anim-card-right {
            animation: slideInRight 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* Delays calculados para una transición en cadena fluida */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
        .delay-lines { animation-delay: 0.8s; }
        .delay-channel { animation-delay: 1.1s; }
        .delay-center { animation-delay: 1.4s; }
        .delay-arrow { animation-delay: 1.8s; }
        .delay-right { animation-delay: 2.1s; }

        @keyframes slideInLeft {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes drawLines {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes scaleHorizontal {
            to {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes rotateGear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsividad para pantallas medianas/pequeñas */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                gap: 40px;
                padding: 30px;
            }
            .fork-connector, .main-channel, .transition-arrow {
                display: none; /* Simplificamos conectores en móvil para mantener usabilidad */
            }
            .sources-column {
                width: 100%;
                align-items: center;
            }
            .card {
                width: 100%;
                max-width: 260px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="sources-column">
            <div class="card anim-card-left delay-1">Clientes</div>
            <div class="card anim-card-left delay-2">Productos</div>
            <div class="card anim-card-left delay-3">Ventas</div>
        </div>

        <div class="fork-connector">
            <div class="fork-line fork-line-top anim-fork-lines delay-lines"></div>
            <div class="fork-line fork-line-middle anim-fork-lines delay-lines"></div>
            <div class="fork-line fork-line-bottom anim-fork-lines delay-lines"></div>
        </div>

        <div class="main-channel anim-channel delay-channel">
            <div class="channel-text anim-text delay-channel">Procesos de</div>
        </div>

        <div class="center-node">
            <div class="integration-card anim-card-center delay-center">
                <svg class="gear-icon" viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
                <span>Integración</span>
            </div>
        </div>

        <div class="transition-arrow anim-trans-arrow delay-arrow"></div>

        <div class="dest-node">
            <div class="dataset-card anim-card-right delay-right">
                <svg class="db-icon" viewBox="0 0 24 24">
                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                    <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>
                </svg>
                <span>Dataset Unificado</span>
            </div>
        </div>

    </div>

</body>
</html>
